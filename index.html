<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tableau de bord ACI France</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E24B4A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ACI France">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* ====== Styles globaux ====== */
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fff;--bg2:#f5f4f0;--bg3:#eceae3;--tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;--bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--r:8px;--rl:12px;--nd:#d4d1cb}
    @media(prefers-color-scheme:dark){
      :root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;--tx:#e8e6df;--tx2:#b4b2a9;--tx3:#73726c;--bd:rgba(255,255,255,.12);--bd2:rgba(255,255,255,.25);--nd:#3a3836}
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:var(--bg);color:var(--tx)}
    #wrap{max-width:1200px;margin:0 auto;padding:16px}
    h1{font-size:18px;font-weight:700;margin-bottom:2px}
    .sub{font-size:11px;color:var(--tx3);margin-bottom:14px}
    .nav{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--bd);padding-bottom:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;scrollbar-width:none}
    .nav::-webkit-scrollbar{display:none}
    .nb{font-size:12px;padding:5px 13px;border:1px solid var(--bd2);border-radius:20px;cursor:pointer;background:transparent;color:var(--tx2);white-space:nowrap;flex-shrink:0}
    .nb.on{background:var(--tx);color:var(--bg);border-color:transparent}
    .tp{display:none}
    .tp.on{display:block;animation:fadeTab .18s ease}
    @keyframes fadeTab{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
    .kpi{background:var(--bg2);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:background 0.2s;}
    .kpi:hover{background:var(--bg3)}
    .kl{font-size:10px;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
    .kv{font-size:20px;font-weight:700}
    .ks{font-size:10px;color:var(--tx3);margin-top:1px}
    .mlay{display:grid;grid-template-columns:1fr 360px;gap:10px;align-items:start}
    @media(max-width:720px){.mlay{grid-template-columns:1fr}}
    .mwrap{background:var(--bg2);border-radius:var(--rl);padding:10px;border:1px solid var(--bd)}
    .mctrl{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap}
    .mctrl span{font-size:11px;color:var(--tx3)}
    .vb{font-size:11px;padding:3px 8px;border:1px solid var(--bd2);border-radius:4px;cursor:pointer;background:transparent;color:var(--tx2)}
    .vb.on{background:var(--tx);color:var(--bg);border-color:transparent}
    #map{height:500px;border-radius:var(--rl);border:1px solid var(--bd)}
    .panel-container{
      background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);
      padding:12px;min-height:300px;display:flex;flex-direction:column;
    }
    .panel-tabs{display:flex;gap:4px;margin-bottom:8px}
    .panel-tab{
      padding:4px 12px;border:1px solid var(--bd);border-radius:4px;
      cursor:pointer;font-size:11px;background:var(--bg2);color:var(--tx2)
    }
    .panel-tab.active{background:var(--tx);color:var(--bg);border-color:transparent}
    .panel-content{flex:1;overflow-y:auto;font-size:12px}
    .leaflet-popup-content{font-family:inherit;color:var(--tx)}
    .leaflet-popup-content a{color:#185fa5}
    .leaflet-tooltip{font-family:inherit;background:var(--bg);border:1px solid var(--bd2);border-radius:4px;padding:4px 8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .alert-banner{position:sticky;top:0;z-index:100;background:#E24B4A;color:#fff;font-size:11px;font-weight:600;padding:7px 14px;border-radius:var(--r);margin-bottom:10px;display:flex;align-items:center;gap:8px;cursor:pointer}
    .alert-banner.warn{background:#EF9F27}
    .alert-banner.info{background:#185fa5}
    /* ... tous les autres styles restent les mêmes que dans votre app.html ... */
    /* Je ne les recopie pas tous ici par manque de place, mais vous devez les conserver. */
    /* Reprenez TOUS les styles de votre app.html existant, et ajoutez juste ceux de la carte ci-dessus. */
  </style>
</head>
<body>
<div id="wrap">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
    <img src="data:image/jpeg;base64,/9j/4AAQ..." alt="CGT ACI" style="height:52px;width:auto;border-radius:6px;flex-shrink:0">
    <div>
      <h1>Tableau de bord ACI &mdash; France</h1>
      <p class="sub" id="subtitle">Ateliers Chantiers d&rsquo;Insertion &bull; Base nationale &bull; Carte interactive</p>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0">
      <button id="sync-btn" class="sync-hdr-btn" onclick="doManualSync()">&#8635; Sync</button>
      <span id="sync-time" style="font-size:10px;color:var(--tx3);white-space:nowrap;margin-left:2px"></span>
    </div>
  </div>

  <div class="nav">
    <button class="nb" onclick="goTab('conquete')">&#128640; Conquête</button>
    <button class="nb" onclick="goTab('tableau')">&#128203; Tableau</button>
    <button class="nb on" onclick="goTab('carte')">&#128506; Carte</button>
    <button class="nb" onclick="goTab('calendrier')">&#128197; Calendrier</button>
    <button class="nb" onclick="goTab('ciblage')">&#127919; Ciblage</button>
    <button class="nb" onclick="goTab('contacts')">&#128101; Contacts</button>
    <button class="nb" onclick="goTab('udul')">&#127970; UD &amp; UL</button>
    <button class="nb" onclick="goTab('syndicats')">&#128202; Syndicats</button>
    <button class="nb" onclick="goTab('outils')">&#9881;&#65039; Outils</button>
  </div>

  <div class="krow" id="krow"></div>
  <div id="alerts-bar"></div>

  <!-- Onglet Carte -->
  <div class="tp on" id="tp-carte">
    <div class="mlay">
      <div class="mwrap">
        <div class="mctrl">
          <span>Vue :</span>
          <button class="vb on" id="vb-reg" onclick="setView('regions')">Régions</button>
          <button class="vb" id="vb-dep" onclick="setView('depts')">Départements</button>
          <span style="margin-left:6px">Couleur :</span>
          <button class="vb on" id="cb-win" onclick="setColor('winner')">Syndicat maj.</button>
          <button class="vb" id="cb-par" onclick="setColor('participation')">Participation</button>
          <button class="vb" id="cb-str" onclick="setColor('structures')">Nb structures</button>
        </div>
        <div id="map"></div>
        <div class="lgd" id="lgd"></div>
      </div>
      <div class="panel-container" id="panel">
        <div class="panel-tabs" id="panel-tabs"></div>
        <div class="panel-content" id="panel-content">
          <div class="epanel">
            <div style="font-size:26px;margin-bottom:8px">&#128506;</div>
            <strong>Sélectionnez une zone</strong><br>
            Cliquez sur une région ou un département pour explorer les structures ACI.
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Les autres onglets (tableau, calendrier, ciblage, etc.) doivent être conservés exactement comme dans votre app.html d'origine -->
  <!-- Par exemple, l'onglet Tableau : -->
  <div class="tp" id="tp-tableau">
    <!-- ... conserver le contenu de l'onglet tableau de votre app.html ... -->
  </div>
  <!-- etc. pour tous les autres onglets -->

</div> <!-- #wrap -->

<!-- Chargement des données externalisées -->
<script src="data.js"></script>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ========== INJECTION DE TOUT LE CODE JAVASCRIPT DE VOTRE APPLICATION ==========
  // Copiez ici l'intégralité du JavaScript de votre app.html (fonctions goTab, buildTable, etc.)
  // Ajoutez ensuite le code spécifique à la carte Leaflet fourni ci-dessous

  // ========== CODE CARTE LEAFLET (à placer après votre code existant) ==========
  (function() {
    var map, regionsLayer, deptsLayer;
    var currentView = 'regions';
    var colorMode = 'winner';

    function rgba(hex, alpha) {
      var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return 'rgba('+r+','+g+','+b+','+alpha+')';
    }

    function regionStyle(feature) {
      var dk = RS[feature.properties.nom];
      var fill = getFillColor(dk);
      return { fillColor: fill, fillOpacity: 0.55, weight: 1.5, color: '#fff' };
    }

    function deptStyle(feature) {
      var dk = getDeptDk(feature.properties.code);
      var fill = getFillColor(dk);
      return { fillColor: fill, fillOpacity: 0.5, weight: 1, color: '#fff' };
    }

    function getFillColor(dk) {
      if (!dk || dk.count === 0) return 'var(--nd)';
      var maxCount = 200;
      if (colorMode === 'winner') {
        var gan = dk.gagnant || 'cgt';
        var base = (UC[gan.toLowerCase()] || '#888');
        return rgba(base, 0.4 + Math.min(1, dk.count / maxCount) * 0.5);
      }
      if (colorMode === 'participation') {
        var p = (dk.part || 0) / 100;
        return rgba('#0f6e56', 0.2 + p * 0.8);
      }
      var s = dk.count / maxCount;
      return rgba('#185fa5', 0.2 + s * 0.8);
    }

    function loadRegions() {
      if (regionsLayer) map.removeLayer(regionsLayer);
      regionsLayer = L.geoJSON(regionsGeoJSON, {
        style: regionStyle,
        onEachFeature: function(feature, layer) {
          layer.on({
            mouseover: function(e) { highlightFeature(e, feature); },
            mouseout: resetHighlight,
            click: function() { zoomToRegion(feature); }
          });
        }
      }).addTo(map);
    }

    function loadDepts() {
      if (deptsLayer) map.removeLayer(deptsLayer);
      deptsLayer = L.geoJSON(deptsGeoJSON, {
        style: deptStyle,
        onEachFeature: function(feature, layer) {
          layer.on({
            mouseover: function(e) { highlightFeature(e, feature); },
            mouseout: resetHighlight,
            click: function() { zoomToDept(feature); }
          });
        }
      });
    }

    function highlightFeature(e, feature) {
      var layer = e.target;
      layer.setStyle({ weight: 3, fillOpacity: 0.8 });
      var html = '<strong>' + feature.properties.nom + '</strong><br>';
      var dk = currentView === 'regions' ? RS[feature.properties.nom] : getDeptDk(feature.properties.code);
      if (dk) html += dk.count + ' structures, ' + (dk.part || 0) + '% partic.';
      layer.bindTooltip(html).openTooltip(e.latlng);
    }

    function resetHighlight(e) {
      if (currentView === 'regions') regionsLayer.resetStyle(e.target);
      else deptsLayer.resetStyle(e.target);
    }

    function zoomToRegion(feature) {
      map.fitBounds(feature.getBounds());
      var dk = RS[feature.properties.nom];
      updatePanel(dk, feature.properties.nom);
    }

    function zoomToDept(feature) {
      map.fitBounds(feature.getBounds());
      var dk = getDeptDk(feature.properties.code);
      updatePanel(dk, feature.properties.nom + ' (' + feature.properties.code + ')');
    }

    function updatePanel(dk, title) {
      var tabs = document.getElementById('panel-tabs');
      var content = document.getElementById('panel-content');
      tabs.innerHTML = '<div class="panel-tab active">Stats</div><div class="panel-tab">Structures</div>';
      content.innerHTML = panelStats(dk, title);
      tabs.querySelectorAll('.panel-tab').forEach(function(tab, idx) {
        tab.addEventListener('click', function() {
          tabs.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          content.innerHTML = idx === 0 ? panelStats(dk, title) : panelStructures(dk);
        });
      });
    }

    function panelStats(dk, title) {
      if (!dk) return '<div class="epanel">Aucune donnée</div>';
      var html = '<div class="ph">' + title + '</div>';
      html += '<div class="ps">' + dk.count + ' structure(s)</div>';
      if (dk.insc > 0) {
        html += '<div class="strow"><span class="stl">Inscrits</span><span class="stv">' + dk.insc + '</span></div>';
        html += '<div class="strow"><span class="stl">Participation</span><span class="stv">' + (dk.part||0) + '%</span></div>';
        var gan = dk.gagnant || '';
        html += '<div class="strow"><span class="stl">Syndicat maj.</span><span class="stv" style="color:' + (UC[gan] || '#888') + '">' + (ULN[gan]||gan||'—') + '</span></div>';
      }
      html += '<button class="ebtn" style="margin-top:8px" onclick="goTab(\'ciblage\'); document.getElementById(\'cib-reg\').value=\'' + title.split('(')[0].trim() + '\'; buildCiblage();">Cibler cette région</button>';
      return html;
    }

    function panelStructures(dk) {
      if (!dk || !dk.structs || !dk.structs.length) return '<div class="epanel">Aucune structure</div>';
      var html = '<div class="slist">';
      dk.structs.forEach(function(s) {
        var nom = s.nom || s.n || '';
        var ville = s.ville || s.v || '';
        var siret = s.siret || s.si || '';
        html += '<div class="si" onclick="openFiche(\'' + siret + '\')"><div class="sn">' + nom + '</div><div class="si2">' + ville + '</div></div>';
      });
      html += '</div>';
      return html;
    }

    window.setView = function(mode) {
      currentView = mode;
      if (mode === 'regions') {
        if (deptsLayer) map.removeLayer(deptsLayer);
        if (!map.hasLayer(regionsLayer)) map.addLayer(regionsLayer);
      } else {
        if (!deptsLayer) loadDepts();
        map.removeLayer(regionsLayer);
        map.addLayer(deptsLayer);
      }
      document.getElementById('vb-reg').classList.toggle('on', mode === 'regions');
      document.getElementById('vb-dep').classList.toggle('on', mode === 'depts');
    };

    window.setColor = function(mode) {
      colorMode = mode;
      document.getElementById('cb-win').classList.toggle('on', mode === 'winner');
      document.getElementById('cb-par').classList.toggle('on', mode === 'participation');
      document.getElementById('cb-str').classList.toggle('on', mode === 'structures');
      if (regionsLayer) regionsLayer.setStyle(regionStyle);
      if (deptsLayer) deptsLayer.setStyle(deptStyle);
    };

    function initMap() {
      map = L.map('map', {
        center: [46.603354, 1.888334],
        zoom: 6,
        zoomControl: true,
        preferCanvas: true
      });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 14
      }).addTo(map);
      loadRegions();
      setView('regions');
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMap);
    } else {
      initMap();
    }
  })();
</script>
</body>
  </html>
